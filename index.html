<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kaline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* İnternetsiz fallback — sistem fontları */
  @font-face {
    font-family: 'Playfair Display';
    font-style: normal;
    font-weight: 400;
    src: local('Georgia'), local('Times New Roman');
  }
  @font-face {
    font-family: 'Cormorant Garamond';
    font-style: normal;
    font-weight: 400;
    src: local('Palatino'), local('Book Antiqua'), local('Georgia');
  }
</style>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--cream:#F2EAE0;--dark:#1a1a1a;--red:#C0392B;--brown:#6B4423}
  body{background:var(--cream);font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;min-height:100vh;overflow-x:hidden}

  /* HERO */
  .hero{position:relative;height:320px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px}
  .hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center top;}
  .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(242,234,224,1) 0%,rgba(242,234,224,0.55) 40%,rgba(242,234,224,0.05) 100%)}
  .hero-logo{position:relative;z-index:10;width:240px;display:block;}

  /* PETALS */
  #petalContainer{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;overflow:hidden}
  .petal{position:absolute;opacity:0;animation:petalFall linear forwards}
  @keyframes petalFall{
    0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(1);}
    8%{opacity:0.95;}
    85%{opacity:0.7;}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0.5);}
  }

  /* TABS — wrap serif, altı çizili */
  .tabs-wrap{
    padding:18px 20px 14px;
    background:var(--cream);
  }
  .tabs{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .tab{
    background:transparent;border:none;
    font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;
    font-size:16px;font-style:normal;font-weight:700;
    color:rgba(107,68,35,0.82);
    cursor:pointer;
    padding:6px 12px;
    letter-spacing:2px;
    text-transform:uppercase;
    transition:all .22s;
    white-space:nowrap;
    position:relative;
    display:inline-block;
    width:auto;
    text-align:center;
  }
  .tab::after{
    content:'';
    position:absolute;
    bottom:0;left:50%;
    transform:translateX(-50%);
    width:0;
    height:2px;
    background:var(--brown);
    transition:width .22s;
  }
  .tab.active{color:var(--brown);font-weight:800;}
  .tab.active::after{width:calc(100% - 8px);}
  .tab:hover:not(.active){color:var(--brown);opacity:0.9;}

  /* SECTION TITLE */
  .section-title{
    font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;
    font-size:20px;font-style:normal;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--brown);letter-spacing:1.5px;
    text-align:center;
    padding:20px 16px 6px;
    border-bottom:1.5px solid var(--brown);
    margin:0 16px 18px;
  }

  /* Alt başlık */
  .sub-title{
    font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;
    font-size:14px;font-style:normal;
    color:var(--brown);opacity:0.7;
    padding:14px 0 8px;
    border-bottom:1px solid rgba(107,68,35,0.12);
    margin-bottom:10px;
  }

  /* MENU */
  .menu-section{display:none;padding:0 16px 48px}
  .menu-section.active{display:block;animation:sectionFade 0.35s ease-out forwards;}
  @keyframes sectionFade{
    0%{opacity:0;transform:translateY(10px);}
    100%{opacity:1;transform:translateY(0);}
  }
  .menu-item{
    display:flex;align-items:center;
    background:#fff;border-radius:14px;
    margin-bottom:10px;padding:14px 16px;
    box-shadow:0 1px 10px rgba(0,0,0,0.06);gap:14px;
  }
  .item-img{width:70px;height:70px;border-radius:12px;flex-shrink:0;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
  .item-info{flex:1;min-width:0}
  .item-name{font-family:'Inter',sans-serif;font-size:14.5px;color:var(--dark);font-weight:400;font-style:normal;margin-bottom:3px;line-height:1.3;letter-spacing:0.1px}
  .item-desc{font-family:'Inter',sans-serif;font-size:12px;color:#888;font-weight:400;line-height:1.4;font-style:normal}
  .item-price{font-family:'Inter',sans-serif;font-size:14.5px;color:var(--red);font-weight:400;font-style:normal;flex-shrink:0;padding-left:10px;white-space:nowrap}
  .menu-note{font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;font-size:12.5px;color:var(--red);font-style:italic;padding:10px 4px 4px;opacity:0.85;line-height:1.5}
</style>
</head>

<div id="kampanya-wrap" style="display:none;margin:0 16px 0;padding:14px 18px;background:#fff;border-radius:14px;border-left:3px solid var(--red);box-shadow:0 1px 8px rgba(0,0,0,0.06);">
  <p style="font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;font-size:13px;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-style:italic;">Kampanya</p>
  <p id="kampanya-text" style="font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;font-size:15px;color:var(--brown);line-height:1.6;"></p>
</div>
<div class="tabs-wrap">
  <div class="tabs" id="tabs-container"></div>
</div>
<div id="sections-container">
  <p style="text-align:center;padding:60px 16px;font-family:'Cormorant Garamond',Palatino,'Book Antiqua',Georgia,serif;color:var(--brown);opacity:0.7;font-size:16px;">Menü yükleniyor...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
const SUPABASE_URL = "https://fricajuiyszifxpvrjax.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sE-jxeVGlxiHoFNLkpWWxw_7RerbTr7";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function escapeHtml(str) {
  return (str ?? "").toString().replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function placeholderIcon() {
  return '<div class="item-img" style="color:var(--brown);opacity:0.35;font-size:26px;">☕</div>';
}

async function loadMenu() {
  try {
    const { data: cafe, error: cafeErr } = await sb.from("cafes").select("id").limit(1).single();
    if (cafeErr) throw cafeErr;
    const cafeId = cafe.id;

    const [catsRes, itemsRes, campsRes, gamesRes, clubsRes] = await Promise.all([
      sb.from("categories").select("*").eq("cafe_id", cafeId).order("sort_order"),
      sb.from("menu_items").select("*").eq("cafe_id", cafeId).eq("is_available", true).order("sort_order"),
      sb.from("campaign_banners").select("*").eq("cafe_id", cafeId).eq("is_active", true).order("sort_order"),
      sb.from("games").select("*").eq("cafe_id", cafeId).order("sort_order"),
      sb.from("student_clubs").select("*").eq("cafe_id", cafeId).order("sort_order"),
    ]);

    const categories = catsRes.data || [];
    const items = itemsRes.data || [];
    const campaigns = campsRes.data || [];
    const games = gamesRes.data || [];
    const clubs = clubsRes.data || [];

    renderTabs(categories);
    renderSections(categories, items, campaigns, games, clubs);
  } catch (err) {
    console.error(err);
    document.getElementById("sections-container").innerHTML =
      '<p style="text-align:center;padding:60px 16px;font-family:\'Cormorant Garamond\',serif;color:var(--red);">Menü şu an yüklenemiyor, lütfen daha sonra tekrar dene.</p>';
  }
}

function renderTabs(categories) {
  let html = '<button class="tab active" onclick="switchTab(\'kampanyalar\',this)">🎉 Kampanyalar</button>';
  categories.forEach(cat => {
    html += '<button class="tab" onclick="switchTab(\'cat-' + cat.id + '\',this)">' + escapeHtml(cat.name) + '</button>';
  });
  html += '<button class="tab" onclick="switchTab(\'oyunlar\',this)">🎲 Oyunlar</button>';
  document.getElementById("tabs-container").innerHTML = html;
}

function renderSections(categories, items, campaigns, games, clubs) {
  let html = "";

  /* KAMPANYALAR */
  html += '<div id="kampanyalar" class="menu-section active">';
  html += '<p class="section-title">Kampanyalar</p>';
  html += '<div style="padding:0 16px 24px;">';
  if (campaigns.length === 0) {
    html += '<p style="text-align:center;font-family:\'Inter\',sans-serif;font-size:13px;color:#999;padding:10px 0;">Şu an aktif kampanya yok.</p>';
  } else {
    campaigns.forEach(c => {
      html += '<div style="border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.13);margin-bottom:16px;">';
      html += '<img src="' + c.image_url + '" alt="Kampanya Görseli" style="width:100%;display:block;border-radius:18px;"/>';
      if (c.title) {
        html += '<div style="padding:10px 4px 0;text-align:center;font-family:\'Cormorant Garamond\',Palatino,\'Book Antiqua\',Georgia,serif;color:var(--brown);font-size:15px;">' + escapeHtml(c.title) + '</div>';
      }
      html += '</div>';
    });
  }
  html += '</div>';

  html += '<p class="section-title" style="margin-top:24px;">Anlaşmalı Öğrenci Kulüpleri</p>';
  html += '<div style="padding:0 16px 24px;display:flex;flex-direction:column;gap:16px;">';
  if (clubs.length === 0) {
    html += '<p style="text-align:center;font-family:\'Inter\',sans-serif;font-size:13px;color:#999;padding:10px 0;">Henüz kulüp eklenmedi.</p>';
  } else {
    clubs.forEach(c => {
      html += '<div style="background:#fff;border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:20px 20px;display:flex;align-items:center;gap:16px;">';
      html += '<div style="width:52px;height:52px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">' + escapeHtml(c.icon || "🎓") + '</div>';
      html += '<div><div style="font-family:\'Inter\',sans-serif;font-size:16px;font-weight:400;color:var(--dark);letter-spacing:0.2px;">' + escapeHtml(c.name) + '</div>';
      if (c.description) {
        html += '<div style="font-family:\'Inter\',sans-serif;font-size:13px;color:var(--brown);opacity:0.8;margin-top:2px;">' + escapeHtml(c.description) + '</div>';
      }
      html += '</div></div>';
    });
  }
  html += '</div></div>';

  /* KATEGORİLER */
  categories.forEach(cat => {
    const catItems = items.filter(i => i.category_id === cat.id);
    html += '<div id="cat-' + cat.id + '" class="menu-section">';
    html += '<p class="section-title">' + escapeHtml(cat.name) + '</p>';
    if (catItems.length === 0) {
      html += '<p style="text-align:center;font-family:\'Inter\',sans-serif;font-size:13px;color:#999;padding:10px 0;">Bu kategoride ürün yok.</p>';
    } else {
      catItems.forEach(item => {
        html += '<div class="menu-item">';
        html += item.image_url
          ? '<div class="item-img"><img src="' + item.image_url + '" style="width:70px;height:70px;object-fit:cover;"/></div>'
          : placeholderIcon();
        html += '<div class="item-info"><div class="item-name">' + escapeHtml(item.name) + '</div>';
        if (item.description) {
          html += '<div class="item-desc">' + escapeHtml(item.description) + '</div>';
        }
        html += '</div>';
        html += '<div class="item-price">' + Number(item.price).toLocaleString("tr-TR") + ' ₺</div>';
        html += '</div>';
      });
    }
    html += '</div>';
  });

  /* OYUNLAR */
  html += '<div id="oyunlar" class="menu-section">';
  html += '<p class="section-title">Oyunlar</p>';
  html += '<div style="padding:0 16px 24px;display:flex;flex-direction:column;gap:20px;">';
  if (games.length === 0) {
    html += '<p style="text-align:center;font-family:\'Inter\',sans-serif;font-size:13px;color:#999;padding:10px 0;">Henüz oyun eklenmedi.</p>';
  } else {
    games.forEach(g => {
      html += '<div style="border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.12);background:#fff;">';
      html += g.image_url
        ? '<img src="' + g.image_url + '" style="width:100%;height:220px;object-fit:cover;display:block;"/>'
        : '<div style="width:100%;height:220px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:48px;">🎲</div>';
      html += '<div style="padding:14px 16px;text-align:center;">';
      html += '<span style="font-family:\'Cormorant Garamond\',Palatino,serif;font-size:24px;color:var(--dark);font-weight:700;letter-spacing:2px;text-transform:uppercase;">' + escapeHtml(g.name) + '</span>';
      html += '</div></div>';
    });
  }
  html += '</div></div>';

  document.getElementById("sections-container").innerHTML = html;
}

loadMenu();
</script>
